<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <title>ShinkanSearch - Results</title>
</head>
<body>
    <header>
        <a href="index.html" id="back-btn">&#9711;</a>
        <form id="search-form" action="results.html" method="get">
            <input type="text" id="query" name="q" placeholder="search..." autofocus>
            <button type="submit">search</button>

    <div id="main">
        <div id="results"></div>
        <div id="sidebar"></div>
    </div>

    <footer>Built by The Most Most Wanted</footer>
    <script src="search.js"></script>
</body>
</html>
